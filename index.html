<!DOCTYPE html>
<html>
<head>
<title>Moonshoes</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial, sans-serif;
color:white;

/* DESKTOP BACKGROUND */
background: url('moonshoes-logo.png') no-repeat center center;
background-size: cover;
}

/* LINKS (BOTTOM CENTER) */
.links{
position:absolute;
bottom:60px;
width:100%;
text-align:center;
}

.links a{
color:white;
text-decoration:none;
margin:15px;
font-size:16px;
letter-spacing:1px;
opacity:0.8;
transition:0.3s;
}

.links a:hover{
opacity:1;
text-shadow:0 0 8px rgba(255,255,255,0.6);
}

/* MOBILE FIX */
@media (max-width: 768px) {

body{
background-size: contain;
background-position: center;
background-repeat: no-repeat;
background-color: black;
}

.links{
bottom:30px;
}

.links a{
font-size:14px;
margin:10px;
}

}

</style>
</head>

<body>

<div class="links">
<a href="#">YouTube</a>
<a href="#">Spotify</a>
<a href="#">Apple Music</a>
<a href="#">Instagram</a>
<a href="#">TikTok</a>
</div>

</body>
</html>
