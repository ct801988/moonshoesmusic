<!DOCTYPE html>
<html>
<head>
<title>Moonshoes</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
overflow-x:hidden;
}

/* ===== SECTION 1 (LANDING) ===== */
.hero{
height:100vh;
background: url('moonshoes-logo.png') no-repeat center center;
background-size: cover;
position:relative;
}

/* LINKS stay on landing page */
.links{
position:absolute;
bottom:60px;
width:100%;
text-align:center;
}

.links a{
color:white;
text-decoration:none;
margin:15px;
font-size:16px;
letter-spacing:1px;
opacity:0.8;
transition:0.3s;
}

.links a:hover{
opacity:1;
text-shadow:0 0 8px rgba(255,255,255,0.6);
}

/* ===== SECTION 2 (VIDEO) ===== */
.video-section{
height:100vh;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.video-section h2{
margin-bottom:20px;
letter-spacing:2px;
}

.video-container{
width:80%;
max-width:800px;
aspect-ratio:16/9;
}

.video-container iframe{
width:100%;
height:100%;
}

/* ===== MOBILE FIX ===== */
@media (max-width: 768px){

.hero{
background-size: contain;
background-repeat: no-repeat;
background-color:black;
}

.links{
bottom:25px;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.links a{
font-size:13px;
margin:0;
}

}

</style>
</head>

<body>

<!-- SECTION 1 -->
<section class="hero">

<div class="links">
<a href="https://www.youtube.com/@moonshoesmusic" target="_blank">YouTube</a>
<a href="https://open.spotify.com/artist/3p0NtW15t7tw3GrRLcbaYE" target="_blank">Spotify</a>
<a href="https://music.apple.com/us/artist/moonshoes/1894727751" target="_blank">Apple Music</a>
<a href="https://www.instagram.com/moonshoes.music" target="_blank">Instagram</a>
<a href="https://www.tiktok.com/@moonshoesmusic" target="_blank">TikTok</a>
</div>

</section>

<!-- SECTION 2 -->
<section class="video-section">

<h2>Homesick for the Future</h2>

<div class="video-container">
<iframe 
src="https://www.youtube.com/embed/sIIRFZJw9Ro"
frameborder="0"
allowfullscreen>
</iframe>
</div>

</section>

</body>
</html>
