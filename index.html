<!DOCTYPE html>
<html>
<head>
<title>Moonshoes</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
overflow:hidden;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
text-align:center;
}

.center img{
width:500px;
max-width:90vw;
}

.links{
margin-top:25px;
}

.links a{
color:white;
text-decoration:none;
margin:15px;
opacity:0.7;
}

.links a:hover{
opacity:1;
}

.orbit{
position:absolute;
top:50%;
left:50%;
width:700px;
height:700px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.1);
transform:translate(-50%, -50%);
animation:spin 120s linear infinite;
}

@keyframes spin{
from{transform:translate(-50%, -50%) rotate(0deg);}
to{transform:translate(-50%, -50%) rotate(360deg);}
}

</style>
</head>

<body>

<div class="orbit"></div>

<div class="center">
<img src="moonshoes-logo.png">

<div class="links">
<a href="#">Spotify</a>
<a href="#">YouTube</a>
<a href="#">Instagram</a>
</div>
</div>

</body>
</html>
