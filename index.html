<!DOCTYPE html>
<html>
<head>
<title>Moonshoes</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html{
scroll-behavior:smooth;
scroll-snap-type:y mandatory;
}

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
overflow-x:hidden;
}

/* ===== HERO SECTION ===== */
.hero{
height:100vh;
background: url('moonshoes-logo.png') no-repeat center center;
background-size: cover;
position:relative;
scroll-snap-align:start;
}

/* FADE OVERLAY */
.fade-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,1) 100%);
pointer-events:none;
}

/* LINKS */
.links{
position:absolute;
bottom:60px;
width:100%;
text-align:center;
z-index:2;
}

.links a{
color:white;
text-decoration:none;
margin:15px;
font-size:16px;
letter-spacing:1px;
opacity:0.8;
transition:0.3s;
}

.links a:hover{
opacity:1;
text-shadow:0 0 8px rgba(255,255,255,0.6);
}

/* ===== VIDEO SECTION ===== */
.video-section{
height:100vh;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
scroll-snap-align:start;
opacity:0;
transform:translateY(40px);
animation:fadeIn 1.5s ease forwards;
animation-delay:0.5s;
}

.video-section h2{
margin-bottom:20px;
letter-spacing:2px;
}

.video-container{
width:80%;
max-width:800px;
aspect-ratio:16/9;
}

.video-container iframe{
width:100%;
height:100%;
}

/* FADE IN ANIMATION */
@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

/* ===== MOBILE ===== */
@media (max-width: 768px){

.hero{
background-size: contain;
background-repeat: no-repeat;
background-color:black;
}

.links{
bottom:25px;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.links a{
font-size:13px;
margin:0;
}

}

</style>

<script>
window.onload = function() {
  window.scrollTo(0, 0);
};
</script>

</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="fade-overlay"></div>

<div class="links">
<a href="https://www.youtube.com/@moonshoesmusic" target="_blank">YouTube</a>
<a href="https://open.spotify.com/artist/3p0NtW15t7tw3GrRLcbaYE" target="_blank">Spotify</a>
<a href="https://music.apple.com/us/artist/moonshoes/1894727751" target="_blank">Apple Music</a>
<a href="https://www.instagram.com/moonshoes.music" target="_blank">Instagram</a>
<a href="https://www.tiktok.com/@moonshoesmusic" target="_blank">TikTok</a>
</div>

</section>

<!-- VIDEO -->
<section class="video-section">

<h2>Homesick for the Future</h2>

<div class="video-container">
<iframe 
src="https://www.youtube.com/embed/sIIRFZJw9Ro"
frameborder="0"
allowfullscreen>
</iframe>
</div>

</section>

</body>
</html>
