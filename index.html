<!DOCTYPE html>
<html>
<head>
  <title>Moonshoes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html{
      scroll-behavior:smooth;
      background:#000;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#000;
      color:#fff;
      overflow-x:hidden;
    }

    /* ===== HERO / DESKTOP LANDING ===== */
    .hero{
      min-height:100vh;
      min-height:100dvh;
      background:#000 url('moonshoes-logo.png') no-repeat center center;
      background-size:cover;
      position:relative;
      box-sizing:border-box;
    }

    /* mobile-only content hidden on desktop */
    .mobile-hero-inner{
      display:none;
    }

    /* desktop links */
    .desktop-links{
      position:absolute;
      bottom:60px;
      left:0;
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:28px;
    }

    .desktop-links a{
      color:#fff;
      text-decoration:none;
      font-size:15px;
      opacity:0.82;
      transition:0.25s ease;
      white-space:nowrap;
    }

    .desktop-links a:hover{
      opacity:1;
      text-shadow:0 0 8px rgba(255,255,255,0.55);
    }

    .scroll-cue{
      display:none;
    }

    /* ===== VIDEO SECTION ===== */
    .video-section{
      background:#000;
      min-height:100vh;
      min-height:100dvh;
      padding:48px 18px 24px;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      box-sizing:border-box;
    }

    .video-content{
      width:100%;
      margin:auto 0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .video-section h2{
      margin:0 0 22px;
      font-size:24px;
      letter-spacing:3px;
      font-weight:700;
      text-transform:uppercase;
    }

    .video-container{
      width:min(90vw, 900px);
      aspect-ratio:16 / 9;
    }

    .video-container iframe{
      display:block;
      width:100%;
      height:100%;
      border:0;
    }

    .footer{
      width:100%;
      margin-top:auto;
      padding-top:32px;
      padding-bottom:6px;
      font-size:11px;
      letter-spacing:1px;
      opacity:0.5;
      color:white;
      text-align:center;
      white-space:normal;
    }

    .footer span{
      display:inline;
    }

    .footer-bottom::before{
      content:" · ";
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px){

      /* remove desktop background behavior on mobile */
      .hero{
        min-height:100dvh;
        background:#000;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:18px 14px 46px;
      }

      /* hide desktop links completely on mobile */
      .desktop-links{
        display:none;
      }

      /* show mobile logo + pill links */
      .mobile-hero-inner{
        width:100%;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:14px;
        transform:translateY(-18px);
      }

      .mobile-logo{
        display:block;
        width:94vw;
        max-height:50vh;
        object-fit:contain;
      }

      .mobile-links{
        display:grid;
        grid-template-columns:repeat(6, auto);
        justify-content:center;
        align-items:center;
        gap:8px;
        max-width:320px;
        width:100%;
      }

      .mobile-links a{
        color:#fff;
        text-decoration:none;
        font-size:11px;
        line-height:1;
        padding:8px 10px;
        border-radius:999px;
        background:rgba(255,255,255,0.08);
        border:1px solid rgba(255,255,255,0.14);
        backdrop-filter:blur(3px);
        white-space:nowrap;
        opacity:0.88;

        display:flex;
        align-items:center;
        justify-content:center;
        text-align:center;
        box-sizing:border-box;
        min-height:28px;
      }

      /* top row: 3 centered pills */
      .mobile-links a:nth-child(1){
        grid-column:1 / span 2;
      }

      .mobile-links a:nth-child(2){
        grid-column:3 / span 2;
      }

      .mobile-links a:nth-child(3){
        grid-column:5 / span 2;
      }

      /* second row: 2 centered pills */
      .mobile-links a:nth-child(4){
        grid-column:2 / span 2;
      }

      .mobile-links a:nth-child(5){
        grid-column:4 / span 2;
      }

      .scroll-cue{
        display:block;
        position:absolute;
        bottom:14px;
        left:50%;
        transform:translateX(-50%);
        font-size:10px;
        letter-spacing:1.5px;
        text-transform:uppercase;
        opacity:0.55;
        transition:opacity 0.35s ease;
        pointer-events:none;
      }

      .scroll-cue.hide{
        opacity:0;
      }

      .scroll-cue::after{
        content:"";
        display:block;
        width:6px;
        height:6px;
        border-right:1px solid white;
        border-bottom:1px solid white;
        transform:rotate(45deg);
        margin:5px auto 0;
        opacity:0.7;
      }

      .video-section{
        min-height:100dvh;
        padding:36px 14px 20px;
      }

      .video-content{
        margin:auto 0;
      }

      .video-section h2{
        font-size:17px;
        letter-spacing:2.2px;
        margin-bottom:24px;
      }

      .video-container{
        width:92vw;
      }

      .footer{
        padding-top:34px;
        padding-bottom:14px;
        font-size:10px;
        letter-spacing:0.8px;
        line-height:1.5;
        max-width:90vw;
      }

      .footer span{
        display:block;
      }

      .footer-bottom::before{
        content:"";
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <!-- MOBILE LOGO + PILLS -->
    <div class="mobile-hero-inner">
      <img src="moonshoes-logo.png" alt="Moonshoes" class="mobile-logo">

      <div class="mobile-links">
        <a href="https://www.youtube.com/@moonshoesmusic" target="_blank">YouTube</a>
        <a href="https://open.spotify.com/artist/3p0NtW15t7tw3GrRLcbaYE" target="_blank">Spotify</a>
        <a href="https://music.apple.com/us/artist/moonshoes/1894727751" target="_blank">Apple Music</a>
        <a href="https://www.instagram.com/moonshoes.music" target="_blank">Instagram</a>
        <a href="https://www.tiktok.com/@moonshoesmusic" target="_blank">TikTok</a>
      </div>
    </div>

    <!-- DESKTOP LINKS ONLY -->
    <div class="desktop-links">
      <a href="https://www.youtube.com/@moonshoesmusic" target="_blank">YouTube</a>
      <a href="https://open.spotify.com/artist/3p0NtW15t7tw3GrRLcbaYE" target="_blank">Spotify</a>
      <a href="https://music.apple.com/us/artist/moonshoes/1894727751" target="_blank">Apple Music</a>
      <a href="https://www.instagram.com/moonshoes.music" target="_blank">Instagram</a>
      <a href="https://www.tiktok.com/@moonshoesmusic" target="_blank">TikTok</a>
    </div>

    <div class="scroll-cue" id="scrollCue">Scroll</div>

  </section>

  <section class="video-section">

    <div class="video-content">
      <h2>Official Music Videos</h2>

      <div class="video-container">
        <iframe
          src="https://www.youtube.com/embed/sIIRFZJw9Ro"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <div class="footer">
      <span class="footer-top">Moonshoes · A Thompson Soundworks Project</span>
      <span class="footer-bottom">© 2026 Chad Thompson</span>
    </div>

  </section>

  <script>
    window.addEventListener("scroll", function() {
      const cue = document.getElementById("scrollCue");

      if (window.scrollY > 20) {
        cue.classList.add("hide");
      } else {
        cue.classList.remove("hide");
      }
    });
  </script>

</body>
</html>
