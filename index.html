<!DOCTYPE html>
<html>
<head>
<title>Moonshoes</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
overflow-x:hidden;
}

/* ===== HERO ===== */
.hero{
height:100vh;
background: url('moonshoes-logo.png') no-repeat center center;
background-size: cover;
position:relative;
display:flex;
flex-direction:column;
justify-content:flex-end;
align-items:center;
}

/* LINKS (DESKTOP) */
.links{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
}

.links a{
color:white;
text-decoration:none;
margin:12px;
font-size:15px;
opacity:0.8;
}

/* ===== VIDEO ===== */
.video-section{
height:100vh;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.video-section h2{
margin-bottom:20px;
letter-spacing:2px;
}

.video-container{
width:80%;
max-width:800px;
aspect-ratio:16/9;
}

.video-container iframe{
width:100%;
height:100%;
}

/* ===== MOBILE FIX ===== */
@media (max-width:768px){

/* 🔥 BACK TO BEST POSITION */
.hero{
height:auto;
min-height:90vh; /* slightly less than full screen */

background-size:contain;
background-repeat:no-repeat;
background-color:black;

/* 🔥 THIS is the sweet spot you liked */
background-position:center 22%;
}

/* LINKS under logo */
.links{
position:static;
margin-top:10px;

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:8px;
}

.links a{
font-size:13px;
margin:0;
}

/* 🔥 TIGHTEN GAP TO VIDEO */
.video-section{
height:auto;
padding:20px 15px 40px 15px; /* reduced spacing */
}

.video-section h2{
margin-bottom:10px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="links">
<a href="https://www.youtube.com/@moonshoesmusic" target="_blank">YouTube</a>
<a href="https://open.spotify.com/artist/3p0NtW15t7tw3GrRLcbaYE" target="_blank">Spotify</a>
<a href="https://music.apple.com/us/artist/moonshoes/1894727751" target="_blank">Apple Music</a>
<a href="https://www.instagram.com/moonshoes.music" target="_blank">Instagram</a>
<a href="https://www.tiktok.com/@moonshoesmusic" target="_blank">TikTok</a>
</div>

</section>

<section class="video-section">

<h2>Homesick for the Future</h2>

<div class="video-container">
<iframe src="https://www.youtube.com/embed/sIIRFZJw9Ro" frameborder="0" allowfullscreen></iframe>
</div>

</section>

</body>
</html>
