<!DOCTYPE html>
<html>
<head>
<title>Moonshoes</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial, sans-serif;
color:white;

/* FULL SCREEN IMAGE */
background: url('moonshoes-logo.png') no-repeat center center;
background-size: cover;
}

/* DARK OVERLAY (makes text readable + cinematic feel) */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

/* LINKS */
.links{
position:absolute;
bottom:60px;
width:100%;
text-align:center;
z-index:2;
}

.links a{
color:white;
text-decoration:none;
margin:15px;
font-size:16px;
letter-spacing:1px;
opacity:0.8;
transition:0.3s;
}

.links a:hover{
opacity:1;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="links">
<a href="#">YouTube</a>
<a href="#">Spotify</a>
<a href="#">Apple Music</a>
<a href="#">Instagram</a>
<a href="#">TikTok</a>
</div>

</body>
</html>
