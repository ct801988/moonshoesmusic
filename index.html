<!DOCTYPE html>
<html>
<head>
<title>Moonshoes</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
overflow:hidden;
}

/* CENTER CONTENT */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
text-align:center;
z-index:2;
}

.center img{
width:80vw;
max-width:1200px;
height:auto;
}

/* LINKS */
.links{
margin-top:30px;
}

.links a{
color:white;
text-decoration:none;
margin:12px;
letter-spacing:1px;
font-size:16px;
opacity:0.7;
transition:0.3s;
}

.links a:hover{
opacity:1;
}

/* ORBIT RING */
.orbit{
position:absolute;
top:50%;
left:50%;
width:800px;
height:800px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.08);
transform:translate(-50%, -50%);
animation:spin 140s linear infinite;
}

/* GLOW BACKGROUND */
.glow{
position:absolute;
top:50%;
left:50%;
width:1200px;
height:1200px;
transform:translate(-50%, -50%);
background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
filter:blur(80px);
z-index:0;
}

/* ANIMATION */
@keyframes spin{
from{transform:translate(-50%, -50%) rotate(0deg);}
to{transform:translate(-50%, -50%) rotate(360deg);}
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="orbit"></div>

<div class="center">

<img src="moonshoes-logo.png">

<div class="links">
<a href="#">YouTube</a>
<a href="#">Spotify</a>
<a href="#">Apple Music</a>
<a href="#">Instagram</a>
<a href="#">TikTok</a>
</div>

</div>

</body>
</html>
